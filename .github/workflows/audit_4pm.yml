name: Shift Compliance Audit — 5PM AEST

on:
  schedule:
    # 5:00 PM AEST = 07:00 UTC — catches morning shifts, 1hr buffer for notes/forms
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: shift-notify
  cancel-in-progress: false

jobs:
  audit-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run shift compliance audit and notify workers
        env:
          CONNECTEAM_API_KEY:   ${{ secrets.CONNECTEAM_API_KEY }}
          CONNECTEAM_SENDER_ID: ${{ secrets.CONNECTEAM_SENDER_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          CC_MGMT_CONV_ID:      ${{ secrets.CC_MGMT_CONV_ID }}
        run: python audit_and_notify.py

      - name: Commit dedup state
        run: |
          git config user.name  "Connect Care Bot"
          git config user.email "bot@connectcare.com.au"
          git add notified_issues.json
          git diff --cached --quiet || git commit -m "chore: update notified_issues 4pm $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase origin main
          git push
