name: New Worker Onboarding Check

on:
  schedule:
    # 9 AM AEST = 11 PM UTC (previous day)
    - cron: "0 23 * * *"
  workflow_dispatch:

concurrency:
  group: onboarding-check
  cancel-in-progress: false

jobs:
  onboarding-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run onboarding and credential check
        env:
          CONNECTEAM_API_KEY:   ${{ secrets.CONNECTEAM_API_KEY }}
          CONNECTEAM_SENDER_ID: ${{ secrets.CONNECTEAM_SENDER_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          CC_MGMT_CONV_ID:      ${{ secrets.CC_MGMT_CONV_ID }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:          ${{ github.repository }}
        run: python onboarding_check.py

      - name: Commit dedup state
        run: |
          git config user.name  "Connect Care Bot"
          git config user.email "bot@connectcare.com.au"
          git pull --rebase origin main
          git add onboarding_notified.json
          git diff --cached --quiet || git commit -m "chore: update onboarding dedup state $(date +'%Y-%m-%d') [skip ci]"
          git push
