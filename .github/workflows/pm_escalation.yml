name: Noon Check — Post Unacknowledged Workers to CC Management

on:
  schedule:
    # 2:00 AM UTC = 12:00 PM AEST / 1:00 PM AEDT
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: compliance-log
  cancel-in-progress: false

jobs:
  noon-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run noon escalation check
        env:
          CONNECTEAM_API_KEY:   ${{ secrets.CONNECTEAM_API_KEY }}
          CONNECTEAM_SENDER_ID: ${{ secrets.CONNECTEAM_SENDER_ID }}
          CC_MGMT_CONV_ID:      ${{ secrets.CC_MGMT_CONV_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
        run: python escalate_notify.py

      - name: Commit updated notifications log
        run: |
          git config user.name  "Connect Care Bot"
          git config user.email "bot@connectcare.com.au"
          git add notifications_log.json
          git diff --cached --quiet || git commit -m "chore: noon escalation log $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase origin main
          git push
