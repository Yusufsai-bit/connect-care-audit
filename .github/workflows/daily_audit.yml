name: Compliance Audit & Notify

on:
  schedule:
    # Every 2 hours between 6 AM and 11 PM AEST (UTC+10 = 20:00 UTC – 13:00 UTC)
    - cron: "0 20,22,0,2,4,6,8,10,12 * * *"
  workflow_dispatch:

concurrency:
  group: compliance-log
  cancel-in-progress: false

jobs:
  audit-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily audit and send notifications
        env:
          CONNECTEAM_API_KEY:   ${{ secrets.CONNECTEAM_API_KEY }}
          CONNECTEAM_SENDER_ID: ${{ secrets.CONNECTEAM_SENDER_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER:        ${{ secrets.TWILIO_NUMBER }}
          MANAGER_NUMBER:       ${{ secrets.MANAGER_NUMBER }}
        run: python daily_notify.py

      - name: Commit updated notifications log
        run: |
          git config user.name  "Connect Care Bot"
          git config user.email "bot@connectcare.com.au"
          git add notifications_log.json
          git diff --cached --quiet || git commit -m "chore: daily audit log $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase origin main
          git push
