name: Daily Compliance Audit & Notify

on:
  schedule:
    # 9:00 PM UTC = 7:00 AM AEST — morning catch-all for anything missed overnight
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: daily-audit
  cancel-in-progress: false

jobs:
  audit-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily audit and send notifications
        env:
          CONNECTEAM_API_KEY:   ${{ secrets.CONNECTEAM_API_KEY }}
          CONNECTEAM_SENDER_ID: ${{ secrets.CONNECTEAM_SENDER_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          CC_MGMT_CONV_ID:      ${{ secrets.CC_MGMT_CONV_ID }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:          ${{ github.repository }}
        run: python daily_notify.py

      - name: Commit updated notifications log
        run: |
          git config user.name  "Connect Care Bot"
          git config user.email "bot@connectcare.com.au"
          git add notifications_log.json
          git diff --cached --quiet || git commit -m "chore: daily audit log $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase origin main
          git push
