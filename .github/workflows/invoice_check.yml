name: Invoice Reconciliation

on:
  schedule:
    # Every Monday 8:00 AM AEST = Sunday 22:00 UTC
    - cron: "0 22 * * 0"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD) — leave blank for current pay period"
        required: false
      end_date:
        description: "End date (YYYY-MM-DD) — leave blank for current pay period"
        required: false

jobs:
  invoice-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run invoice reconciliation
        env:
          CONNECTEAM_API_KEY:   ${{ secrets.CONNECTEAM_API_KEY }}
          CONNECTEAM_SENDER_ID: ${{ secrets.CONNECTEAM_SENDER_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          CC_MGMT_CONV_ID:      ${{ secrets.CC_MGMT_CONV_ID }}
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            python invoice_check.py ${{ github.event.inputs.start_date }} ${{ github.event.inputs.end_date }}
          else
            python invoice_check.py
          fi
