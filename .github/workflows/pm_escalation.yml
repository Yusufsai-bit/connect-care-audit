name: 3 PM Escalation — Chase Unacknowledged Notifications

on:
  schedule:
    # 5:00 AM UTC = 3:00 PM AEST / 4:00 PM AEDT — runs at 3-4 PM Melbourne time
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: compliance-log
  cancel-in-progress: false

jobs:
  escalate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 3 PM escalation
        env:
          CONNECTEAM_API_KEY:   ${{ secrets.CONNECTEAM_API_KEY }}
          CONNECTEAM_SENDER_ID: ${{ secrets.CONNECTEAM_SENDER_ID }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_NUMBER:        ${{ secrets.TWILIO_NUMBER }}
          MANAGER_NUMBER:       ${{ secrets.MANAGER_NUMBER }}
        run: python escalate_notify.py

      - name: Commit updated notifications log
        run: |
          git config user.name  "Connect Care Bot"
          git config user.email "bot@connectcare.com.au"
          git add notifications_log.json
          git diff --cached --quiet || git commit -m "chore: 3pm escalation log $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase origin main
          git push
