name: Shift Compliance Audit — 10:30AM AEST

on:
  schedule:
    # 10:30 AM AEST = 00:30 UTC — catches evening and overnight shifts, 1hr buffer for notes/forms
    - cron: "30 0 * * *"
  workflow_dispatch:

concurrency:
  group: audit-state-push
  cancel-in-progress: false

jobs:
  audit-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run shift compliance audit and notify workers
        env:
          CONNECTEAM_API_KEY:   ${{ secrets.CONNECTEAM_API_KEY }}
          CONNECTEAM_SENDER_ID: ${{ secrets.CONNECTEAM_SENDER_ID }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          CC_MGMT_CONV_ID:      ${{ secrets.CC_MGMT_CONV_ID }}
          AUDIT_DAYS_BACK:      "2"
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:          ${{ github.repository }}
        run: python audit_and_notify.py

      - name: Commit dedup state
        run: |
          git config user.name  "Connect Care Bot"
          git config user.email "bot@connectcare.com.au"
          git add notified_issues.json amy_conversation_log.json worker_profiles.json strike_log.json
          git diff --cached --quiet || git commit -m "chore: update audit state 10:30am $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase origin main
          git push
